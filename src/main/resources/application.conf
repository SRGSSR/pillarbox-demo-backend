ktor {
  deployment {
    port = 8080
    watch = [classes, resources]
    watchDelay = 500
  }

  application {
    modules = [ch.srgssr.pillarbox.backend.ApplicationKt.module]
  }
}

database {
  autoCreate = false
  driverClassName = "org.postgresql.Driver"
  jdbcUrl = ${?DATABASE_URL}
  username = ${?DATABASE_USER}
  password = ${?DATABASE_PASSWORD}

  properties {
    cachePrepStmts = "true"
    prepStmtCacheSize = "250"
    prepStmtCacheSqlLimit = "2048"
    useServerPrepStmts = "true"
    reWriteBatchedInserts = "true"
  }
}

oidc {
  issuer = ${?AUTH_ISSUER}
  client_id = ${?AUTH_CLIENT_ID}
  secret = ${?AUTH_CLIENT_SECRET}
  realm = "Pillarbox"
}

session {
  cookieSecret = ${?SESSION_COOKIE_SECRET}
  timeoutSeconds = 28800
  timeoutSeconds = ${?SESSION_TIMEOUT}
  validationIntervalSeconds = 600
  validationIntervalSeconds = ${?SESSION_VALIDATION_INTERVAL}
  secure = true
  secure = ${?SESSION_SECURE}
}
